name: CI / Deploy Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── BUILD FRONTEND ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producción
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:4000/api' }}
        run: npm run build

      - name: Notificar éxito
        if: success()
        run: echo "✅ Build del frontend completado correctamente."

      - name: Notificar fallo
        if: failure()
        run: |
          echo "❌ El build del frontend falló."
          echo "Revisa los logs anteriores para ver el error."
          exit 1

  # ── TEST BACKEND ──────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Correr tests (si existen)
        run: |
          if [ -f "package.json" ] && npm run test --if-present 2>/dev/null; then
            echo "✅ Tests pasaron."
          else
            echo "ℹ️ No se encontraron tests configurados. Saltando."
          fi

      - name: Verificar sintaxis de app.js
        run: node --check src/app.js && echo "✅ Sintaxis OK"

  # ── NOTIFICACIÓN FINAL ────────────────────────────────────────────────────
  notify:
    name: Resultado del CI
    runs-on: ubuntu-latest
    needs: [build-frontend, test-backend]
    if: always()

    steps:
      - name: Resumen
        run: |
          if [ "${{ needs.build-frontend.result }}" = "success" ] && \
             [ "${{ needs.test-backend.result }}" = "success" ]; then
            echo "🚀 CI completado. Vercel y Railway desplegarán automáticamente."
          else
            echo "❌ CI falló:"
            echo "  Frontend: ${{ needs.build-frontend.result }}"
            echo "  Backend:  ${{ needs.test-backend.result }}"
            exit 1
          fi
